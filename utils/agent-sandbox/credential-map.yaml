# Credential injection map for the agent sandbox sidecar proxy (Phase C).
#
# Maps destination domains to credential sources. The sidecar proxy reads real
# credentials from its own environment (passed by the launcher, never reaching
# the agent container) and injects them into outbound requests.
#
# Two injection modes:
#   1. header: add/replace a specific HTTP header with the real credential.
#   2. placeholder: scan for a known placeholder value in Authorization/other
#      headers and swap it for the real one.
#
# The agent holds placeholder tokens that look syntactically valid but carry no
# real access. The proxy is the only place real credentials exist at runtime.
#
# Environment variables referenced here are set in the sidecar container by the
# launcher (run-agent-sandbox.sh). They are NOT present in the agent container.

services:
  # ── GitHub (API + git HTTPS) ────────────────────────────────────────────────
  # Covers: gh CLI, git clone/push over HTTPS, API calls.
  # The agent's git credential helper returns the placeholder token; the proxy
  # swaps it for the real one.
  github:
    domains:
      - github.com
      - api.github.com
      - uploads.github.com
      - codeload.github.com
    env_var: SANDBOX_CRED_GITHUB_TOKEN
    placeholder: SANDBOX-PLACEHOLDER-GH-TOKEN
    inject:
      # GitHub accepts both "token <PAT>" and "Basic <base64(x-access-token:PAT)>"
      # For API: Authorization: token <real>
      # For git: Authorization: Basic <base64(x-access-token:<real>)>
      mode: github
      # The addon auto-detects git vs API by User-Agent / URL patterns.

  # ── NuGet (package restore) ────────────────────────────────────────────────
  # Azure DevOps / VSTS feeds use Basic auth with a PAT.
  nuget:
    domains:
      - red-gate.pkgs.visualstudio.com
    env_var: SANDBOX_CRED_NUGET_PAT
    placeholder: SANDBOX-PLACEHOLDER-NUGET-PAT
    inject:
      mode: basic_auth
      # Basic auth: base64("user:<PAT>"). NuGet sends the placeholder PAT in
      # a Basic auth header; the proxy swaps it.

  # ── Anthropic API ──────────────────────────────────────────────────────────
  # Claude API key injected as x-api-key header.
  anthropic:
    domains:
      - api.anthropic.com
    env_var: SANDBOX_CRED_ANTHROPIC_KEY
    placeholder: SANDBOX-PLACEHOLDER-ANTHROPIC-KEY
    inject:
      mode: header
      header_name: x-api-key

  # ── Claude Code OAuth (Bearer token for Anthropic API) ──────────────────
  # Claude Code can authenticate via OAuth (CLAUDE_CODE_OAUTH_TOKEN env var)
  # instead of an API key. This uses Authorization: Bearer <token>. Both the
  # API key and OAuth token target api.anthropic.com, but they use different
  # headers (x-api-key vs Authorization: Bearer). The addon checks which
  # placeholder is present and injects accordingly.
  claude_oauth:
    domains:
      - api.anthropic.com
      - statsig.anthropic.com
    env_var: SANDBOX_CRED_CLAUDE_OAUTH
    placeholder: SANDBOX-PLACEHOLDER-CLAUDE-OAUTH
    inject:
      mode: bearer

  # ── Docker registries ──────────────────────────────────────────────────────
  # Docker Hub and GHCR auth use Bearer tokens obtained via a separate auth
  # exchange. For now, docker pull works unauthenticated for public images.
  # Private registry auth is deferred (requires intercepting the /v2/token
  # exchange flow, which is complex). Placeholder for future implementation.
  # docker_hub:
  #   domains:
  #     - registry-1.docker.io
  #     - auth.docker.io
  #   env_var: SANDBOX_CRED_DOCKER_TOKEN
  #   placeholder: SANDBOX-PLACEHOLDER-DOCKER-TOKEN
  #   inject:
  #     mode: docker_registry
